# ==============================================================================
# n8n production / staging deployment
#
# This file runs n8n with a PostgreSQL backend, production-grade settings,
# and persistent storage suitable for a self-hosted server or VPS.
#
# Usage:
#
#   # Copy the production env template and fill in values
#   cp n8n/.env.production.example n8n/.env.production
#
#   # Start the stack
#   docker compose -f n8n/docker-compose.production.yml --env-file n8n/.env.production up -d
#
#   # View logs
#   docker compose -f n8n/docker-compose.production.yml logs -f n8n
#
#   # Stop the stack
#   docker compose -f n8n/docker-compose.production.yml down
#
# n8n is available at: https://<N8N_HOST> (behind a reverse proxy)
# or at http://<server-ip>:5678 without a proxy (not recommended for production).
#
# Data is stored in Docker named volumes and persists across restarts.
# ==============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL — n8n backend database
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed to the host — only accessible from the n8n container.

  # --------------------------------------------------------------------------
  # n8n — workflow automation engine
  # --------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:${N8N_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # -- n8n server --------------------------------------------------------
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${WEBHOOK_URL:-https://localhost:5678/}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-https://localhost:5678/}
      NODE_ENV: production
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}

      # -- Database ----------------------------------------------------------
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

      # -- Execution settings ------------------------------------------------
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-168}

      # -- AI ----------------------------------------------------------------
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_MODEL_ALERT_CLASSIFICATION: ${OPENAI_MODEL_ALERT_CLASSIFICATION:-}
      OPENAI_MODEL_DAILY_SUMMARY: ${OPENAI_MODEL_DAILY_SUMMARY:-}
      OPENAI_MODEL_VIDEO_SCRIPT: ${OPENAI_MODEL_VIDEO_SCRIPT:-}
      OPENAI_MODEL_YOUTUBE_METADATA: ${OPENAI_MODEL_YOUTUBE_METADATA:-}

      # -- Media mode --------------------------------------------------------
      MEDIA_MODE: ${MEDIA_MODE:-image_video}
      AI_IMAGE_COUNT: ${AI_IMAGE_COUNT:-1}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-}
      GOOGLE_TTS_VOICE: ${GOOGLE_TTS_VOICE:-}
      AI_TTS_VOICE: ${AI_TTS_VOICE:-}
      GOOGLE_TTS_LANGUAGE_CODE: ${GOOGLE_TTS_LANGUAGE_CODE:-}

      # -- Render provider ---------------------------------------------------
      RENDER_PROVIDER: ${RENDER_PROVIDER:-}
      SHOTSTACK_API_KEY: ${SHOTSTACK_API_KEY:-}
      CREATOMATE_API_KEY: ${CREATOMATE_API_KEY:-}
      CREATOMATE_TEMPLATE_ID: ${CREATOMATE_TEMPLATE_ID:-}

      # -- Telegram ----------------------------------------------------------
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

      # -- Discord -----------------------------------------------------------
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}

      # -- GitHub publishing -------------------------------------------------
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-ModernContentPlatform}

      # -- News / data sources -----------------------------------------------
      NEWS_API_KEY: ${NEWS_API_KEY:-}

      # -- Cloudflare D1 (HTTP Request nodes calling the D1 REST API) --------
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_D1_DATABASE_ID: ${CLOUDFLARE_D1_DATABASE_ID:-}

    volumes:
      # Persist user-uploaded files and local file storage.
      - n8n_data:/home/node/.n8n

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  n8n_data:
