# ==============================================================================
# Local n8n development environment
#
# This file is intended for LOCAL DEVELOPMENT ONLY — not for production use.
# It runs n8n with SQLite storage, no TLS, and no authentication hardening.
#
# Usage (from the repository root):
#
#   docker compose -f n8n/docker-compose.yml --env-file .env up -d
#
# Or from inside this directory:
#
#   cd n8n
#   docker compose --env-file ../.env up -d
#
# n8n is available at: http://localhost:5678
#
# State persists in:   n8n/local_data/
# Stop the service:    docker compose -f n8n/docker-compose.yml down
# Wipe local state:    docker compose -f n8n/docker-compose.yml down
#                      rm -rf n8n/local_data
# ==============================================================================

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # -- n8n server ----------------------------------------------------------
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      NODE_ENV: development
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}

      # -- AI ------------------------------------------------------------------
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # -- Telegram ------------------------------------------------------------
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

      # -- Discord -------------------------------------------------------------
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}

      # -- GitHub publishing ---------------------------------------------------
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-ModernContentPlatform}

      # -- News / data sources -------------------------------------------------
      NEWS_API_KEY: ${NEWS_API_KEY:-}

      # -- Cloudflare D1 (used in HTTP Request nodes calling the D1 REST API) --
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_D1_DATABASE_ID: ${CLOUDFLARE_D1_DATABASE_ID:-}

    volumes:
      # Persist n8n workflows, credentials, and execution history locally.
      # local_data/ is excluded from version control via .gitignore.
      - ./local_data:/home/node/.n8n

    # Allow workflow HTTP Request nodes to reach the host machine.
    # On Linux, host.docker.internal is not available by default — this adds it.
    # On Docker Desktop (macOS / Windows) this entry is a no-op.
    extra_hosts:
      - "host.docker.internal:host-gateway"
