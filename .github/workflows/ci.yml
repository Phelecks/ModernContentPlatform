name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Run unit tests
        run: npm run test:run -- --reporter=verbose src/__tests__/components src/__tests__/utils src/__tests__/services

      - name: Run source and X tests
        run: >
          npm run test:run -- --reporter=verbose
          src/__tests__/utils/sourceTrust.test.js
          src/__tests__/utils/sourceProviders.test.js
          src/__tests__/utils/url.test.js
          src/__tests__/components/SourceBadge.test.js
          src/__tests__/components/SourceList.test.js
          src/__tests__/integration/workflow.source-ingestion.test.js
          src/__tests__/integration/source-attribution.test.js
          src/__tests__/integration/api.sources.test.js
          src/__tests__/integration/api.internal.sources.test.js

      - name: Run integration tests
        run: npm run test:integration -- --reporter=verbose
